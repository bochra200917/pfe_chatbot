name: CI — Chatbot ZAI Informatique

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────────
  # Job 1 : Linter (flake8)
  # ─────────────────────────────────────────────
  lint:
    name: Linter flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 app/ test/ \
            --max-line-length=120 \
            --exclude=__pycache__,.venv \
            --ignore=E122,E226,E231,E261,E265,E302,E303,E305,E402,E501,F401,F811,W291,W292,W293 \
            --count \
            --statistics

  # ─────────────────────────────────────────────
  # Job 2 : Tests unitaires (pytest)
  # ─────────────────────────────────────────────
  test:
    name: Tests unitaires pytest
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create .env for tests
        run: |
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_USER=test" >> .env
          echo "DB_PASSWORD=test" >> .env
          echo "DB_NAME=test" >> .env
          echo "API_USER=admin" >> .env
          echo "API_PASS=secret" >> .env
          echo "OPENROUTER_API_KEY=test_key" >> .env

      - name: Run test_pydantic
        run: pytest test/test_pydantic.py -v --tb=short

      - name: Run test_whitelist
        run: pytest test/test_whitelist.py -v --tb=short

      - name: Run test_sql_validation
        run: pytest test/test_sql_validation.py -v --tb=short

      - name: Run all tests with coverage
        run: |
          pytest test/ \
            --ignore=test/test_golden_set.py \
            --cov=app \
            --cov-report=term-missing \
            --tb=short \
            -v

  # ─────────────────────────────────────────────
  # Job 3 : Golden set V3 étendu
  # ─────────────────────────────────────────────
  golden_set:
    name: Golden Set V3 (60 questions)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Create .env for tests
        run: |
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_USER=test" >> .env
          echo "DB_PASSWORD=test" >> .env
          echo "DB_NAME=test" >> .env
          echo "API_USER=admin" >> .env
          echo "API_PASS=secret" >> .env
          echo "OPENROUTER_API_KEY=test_key" >> .env

      - name: Validate golden_set_v3_extended.json
        run: |
          python3 -c "
          import json
          with open('test/golden_set/golden_set_v3_extended.json') as f:
              data = json.load(f)
          assert len(data) == 60, f'Attendu 60 questions, trouvé {len(data)}'
          print(f'Golden set valide : {len(data)} questions')
          cats = {}
          for d in data:
              cats[d['category']] = cats.get(d['category'], 0) + 1
          print('Répartition :', cats)
          "

      - name: Run golden set security tests
        run: |
          python3 -c "
          import json, sys, os
          sys.path.insert(0, '.')
          from app.sql_security import detect_injection

          with open('test/golden_set/golden_set_v3_extended.json') as f:
              data = json.load(f)

          injections = [d for d in data if d['expected_reject']]
          passed = 0
          failed = []

          for item in injections:
              try:
                  detect_injection(item['question'])
                  failed.append(item['question'])
              except Exception:
                  passed += 1

          print(f'Injections rejetées : {passed}/{len(injections)}')
          if failed:
              print('ECHECS :', failed)
              sys.exit(1)
          print('Tous les tests injection : OK')
          "